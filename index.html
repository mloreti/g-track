<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-Track · Shot Entry</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Full-screen map -->
    <div id="map"></div>

    <!-- Floating entry toolbar (top-left over map) -->
    <div id="toolbar">
      <span id="guidance-label"></span>
      <button class="tb-btn" id="btn-add-shot">+ Shot</button>
      <button class="tb-btn" id="btn-on-green">On Green</button>
      <button class="tb-btn" id="btn-add-putt">+ Putt</button>
      <button class="tb-btn" id="btn-place-pin">📌 Pin</button>
      <button class="tb-btn" id="btn-undo">↩ Undo</button>
    </div>

    <!-- Bottom info bar -->
    <div id="bottom-bar">
      <div id="hole-stats">
        <div class="stat-group">
          <span class="stat-label">HOLE</span>
          <span class="stat-val" id="stat-hole">1</span>
        </div>
        <div class="stat-group">
          <span class="stat-label">PAR</span>
          <span class="stat-val" id="stat-par">4</span>
        </div>
        <div class="stat-group">
          <span class="stat-label">YARDS</span>
          <span class="stat-val" id="stat-yards">—</span>
        </div>
      </div>

      <div id="hole-nav">
        <button id="btn-prev">‹</button>
        <span id="hole-label">Hole 1 · Par 4</span>
        <button id="btn-next">›</button>
      </div>

      <button id="btn-pbp" class="tb-btn">≡ Shots</button>
    </div>

    <!-- Play By Play panel (slides in from right) -->
    <div id="pbp-panel" class="open">
      <div id="pbp-header">
        <span>Play By Play</span>
        <button id="btn-close-pbp">✕</button>
      </div>

      <div id="score-row">
        <div class="score-field">
          <label>Score</label>
          <input type="number" id="input-score" min="1" max="15">
        </div>
        <div class="score-field">
          <label>Penalties</label>
          <input type="number" id="input-penalties" min="0" max="10" value="0">
        </div>
      </div>

      <div id="shot-list"></div>

      <div id="sg-summary" style="display:none">
        <div class="sg-row"><span>SG: Off Tee</span><span class="sg-val" id="sg-ott">—</span></div>
        <div class="sg-row"><span>SG: Approach</span><span class="sg-val" id="sg-app">—</span></div>
        <div class="sg-row"><span>SG: Putting</span><span class="sg-val" id="sg-putt">—</span></div>
      </div>

      <button id="save-hole-btn">Save Hole →</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
